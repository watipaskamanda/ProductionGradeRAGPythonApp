version: '3.8'

services:
  rag-app:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DB_HOST=postgres
      - DB_NAME=paymaart_test
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-testpass}
      - DB_PORT=5432
    volumes:
      # Persistent volume for semantic dictionary
      - semantic_data:/app/data
    depends_on:
      - postgres
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=paymaart_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-testpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  # Named volume for semantic dictionary persistence
  semantic_data:
    driver: local
  postgres_data:
    driver: local
  qdrant_data:
    driver: local